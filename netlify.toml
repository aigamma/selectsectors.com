# Netlify build configuration for selectsectors.com.

[build]
  # `npm run build` runs the Vite production build into `dist/`. The
  # `build:wasm` step runs first via `prebuild` in package.json so the
  # Rust → WASM artifact in `pkg/` exists before Vite resolves its
  # imports. Net effect: a single `npm run build` invocation handles
  # the full toolchain (cargo → wasm-pack → vite) without the user
  # needing to remember a two-step sequence.
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# /api/* routes hit the Netlify Functions directory. Standard rewrite,
# matches the convention aigamma.com uses so callers do not have to
# remember the `/.netlify/functions/` prefix.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Catch-all 404 for any path that doesn't resolve to a built page or
# a public asset. The 404.html itself is a real page in dist/ with the
# site shell mounted; this redirect just makes sure the right HTTP
# status code is returned and the right file is served on unknown
# paths.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Background functions for the heavy backtest work. The `-background`
# suffix is the Netlify-required marker that flips the function into
# the 15-minute wall-clock execution path; the function returns 202
# immediately and the result lands in Netlify Blobs for the
# `/api/result?hash=` endpoint to read back.
#
# The backtest-background function imports `pkg/backtest_core.js` and
# at module-load time wasm-pack's JS glue does a synchronous fs.read
# on `pkg/backtest_core_bg.wasm` (a sibling of the JS file). The
# Netlify bundler cannot statically trace that runtime path, so we
# include the pkg/ tree explicitly via `included_files`. The .wasm
# artifact is built into pkg/ during `npm run build` which runs
# `wasm-pack build` ahead of the Vite build, so by the time Netlify
# resolves included_files, pkg/ already has the artifact.
[functions."backtest-background"]
  included_files = ["pkg/**"]
  node_bundler = "esbuild"

# Same packaging as backtest-background: needs the WASM artifact
# bundled alongside the function code, and the esbuild bundler is the
# right pick for the wasm-pack CJS output that does a runtime
# fs.readFileSync on the sibling .wasm file.
[functions."compare-background"]
  included_files = ["pkg/**"]
  node_bundler = "esbuild"

# Same packaging as the other background functions.
[functions."scan-background"]
  included_files = ["pkg/**"]
  node_bundler = "esbuild"
#
# Long-cache the static frontend assets. Vite emits content-hashed
# filenames under `/assets/`, so the URLs are immutable by
# construction and the bytes never change at a given path.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon gets a moderate TTL so a future logo update propagates in
# under a week. Bumping the favicon by appending `?v=N` busts caches
# immediately if needed.
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"
